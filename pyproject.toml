[build-system]
requires = ["setuptools>=69", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "intentql"
description = "IntentQL — Intent-driven, deterministic natural language to SQL for Postgres."
version = "0.2.0"
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
authors = [
  { name = "Alexander Abakah" }
]
keywords = ["sql", "intent", "postgres", "sqlalchemy", "llm", "analytics", "natural-language"]
classifiers = [
  "Programming Language :: Python :: 3",
  "License :: OSI Approved :: MIT License",
  "Operating System :: OS Independent",
]

dependencies = [
  "sqlalchemy>=2.0",
  "psycopg2-binary",
  "pydantic>=2.0",
  "pyyaml",
  "python-dotenv",
]

[project.optional-dependencies]
openai = ["openai>=1.0.0"]
google = ["google-generativeai>=0.5.0"]
benchmark = [
  "langchain-openai>=0.2",
  "langchain-google-genai>=2.0",
  "langchain-community>=0.3",
  "python-dotenv",
]
dev = ["ruff>=0.6.0", "build>=1.2.0", "twine>=5.0.0"]

[project.scripts]
intentql = "intentql.cli:main"

[project.urls]
Homepage = "https://github.com/Certifore/intentql"
Repository = "https://github.com/Certifore/intentql"
Issues = "https://github.com/Certifore/intentql/issues"

[tool.setuptools.packages.find]
where = ["."]
include = ["intentql*"]
exclude = ["test*", "tests*"]

[tool.setuptools]
include-package-data = true

[tool.setuptools.data-files]
"config" = ["config/queryplan_spec.yaml"]
