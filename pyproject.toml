[build-system]
requires = ["setuptools>=69", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "dsl-compiler"                       # PyPI distribution name (can differ from import name)
version = "0.1.0"
description = "Deterministic JSON-to-SQL compiler/executor for Postgres analytics DSL"
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
authors = [
  { name = "Alexander Abakah" }
]
keywords = ["sql", "dsl", "postgres", "sqlalchemy", "llm", "analytics"]
classifiers = [
  "Programming Language :: Python :: 3",
  "License :: OSI Approved :: MIT License",
  "Operating System :: OS Independent",
]

dependencies = [
  "PyYAML>=6.0",
  "SQLAlchemy>=2.0",
  "python-dotenv>=1.0",
  "psycopg2-binary>=2.9",
]

[project.optional-dependencies]
openai = ["openai>=1.0.0"]
google = ["google-generativeai>=0.5.0"]
dev = ["pytest>=8", "ruff>=0.6.0", "build>=1.2.0", "twine>=5.0.0"]

[project.urls]
Homepage = "https://github.com/<your-org-or-user>/dsl_compiler"
Repository = "https://github.com/<your-org-or-user>/dsl_compiler"
Issues = "https://github.com/<your-org-or-user>/dsl_compiler/issues"

[tool.setuptools.packages.find]
where = ["."]
include = ["dsl_compiler*"]

# Include your YAML files in source distributions AND wheels.
# Easiest approach without moving files:
[tool.setuptools]
include-package-data = true

[tool.setuptools.data-files]
"config" = ["config/*.yaml"]