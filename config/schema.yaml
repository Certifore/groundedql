version: 1
dialect: postgres

tables:
  - name: customers
    db_table: customers
    primary_id: customer_id
    description: Stores customer information.
    columns:
      - name: customer_id
        db_column: customer_id
        type: varchar
        description: Unique identifier for the customer.
      - name: company_name
        db_column: company_name
        type: varchar
        description: Name of the customer company.
      - name: contact_name
        db_column: contact_name
        type: varchar
        description: Name of the primary contact at the company.
      - name: contact_title
        db_column: contact_title
        type: varchar
        description: Job title of the contact person.
      - name: address
        db_column: address
        type: varchar
        description: Street address of the customer.
      - name: city
        db_column: city
        type: varchar
        description: City where the customer is located.
      - name: region
        db_column: region
        type: varchar
        description: Region or state.
      - name: postal_code
        db_column: postal_code
        type: varchar
        description: Postal or ZIP code.
      - name: country
        db_column: country
        type: varchar
        description: Country where the customer is located.
      - name: phone
        db_column: phone
        type: varchar
        description: Customer phone number.
      - name: fax
        db_column: fax
        type: varchar
        description: Customer fax number.

  - name: orders
    db_table: orders
    primary_id: order_id
    description: Stores customer orders.
    columns:
      - name: order_id
        db_column: order_id
        type: integer
        description: Unique identifier for the order.
      - name: customer_id
        db_column: customer_id
        type: varchar
        description: Foreign key to customers.customer_id.
      - name: employee_id
        db_column: employee_id
        type: integer
        description: Foreign key to employees.employee_id.
      - name: order_date
        db_column: order_date
        type: date
        description: Date the order was placed.
      - name: required_date
        db_column: required_date
        type: date
        description: Date the order is required by.
      - name: shipped_date
        db_column: shipped_date
        type: date
        description: Date the order was shipped. Null if not yet shipped.
      - name: ship_via
        db_column: ship_via
        type: integer
        description: Foreign key to shippers.shipper_id.
      - name: freight
        db_column: freight
        type: numeric
        description: Freight cost for the order.
      - name: ship_name
        db_column: ship_name
        type: varchar
        description: Name of the recipient at the shipping address.
      - name: ship_address
        db_column: ship_address
        type: varchar
        description: Shipping street address.
      - name: ship_city
        db_column: ship_city
        type: varchar
        description: Shipping city.
      - name: ship_region
        db_column: ship_region
        type: varchar
        description: Shipping region or state.
      - name: ship_postal_code
        db_column: ship_postal_code
        type: varchar
        description: Shipping postal code.
      - name: ship_country
        db_column: ship_country
        type: varchar
        description: Shipping country.

  - name: order_details
    db_table: order_details
    description: Line items within each order.
    columns:
      - name: order_id
        db_column: order_id
        type: integer
        description: Foreign key to orders.order_id.
      - name: product_id
        db_column: product_id
        type: integer
        description: Foreign key to products.product_id.
      - name: unit_price
        db_column: unit_price
        type: numeric
        description: Price per unit at time of order.
      - name: quantity
        db_column: quantity
        type: integer
        description: Number of units ordered.
      - name: discount
        db_column: discount
        type: numeric
        description: Discount applied as a fraction. 0.05 means 5 percent discount.

  - name: products
    db_table: products
    primary_id: product_id
    description: Stores product catalog.
    columns:
      - name: product_id
        db_column: product_id
        type: integer
        description: Unique identifier for the product.
      - name: product_name
        db_column: product_name
        type: varchar
        description: Name of the product.
      - name: supplier_id
        db_column: supplier_id
        type: integer
        description: Foreign key to suppliers.supplier_id.
      - name: category_id
        db_column: category_id
        type: integer
        description: Foreign key to categories.category_id.
      - name: quantity_per_unit
        db_column: quantity_per_unit
        type: varchar
        description: How the product is packaged.
      - name: unit_price
        db_column: unit_price
        type: numeric
        description: Current price per unit.
      - name: units_in_stock
        db_column: units_in_stock
        type: integer
        description: Number of units currently in stock.
      - name: units_on_order
        db_column: units_on_order
        type: integer
        description: Number of units currently on order.
      - name: reorder_level
        db_column: reorder_level
        type: integer
        description: Minimum stock level before reorder is triggered.
      - name: discontinued
        db_column: discontinued
        type: integer
        description: 1 if the product is discontinued, 0 if active.

  - name: categories
    db_table: categories
    primary_id: category_id
    description: Product categories.
    columns:
      - name: category_id
        db_column: category_id
        type: integer
        description: Unique identifier for the category.
      - name: category_name
        db_column: category_name
        type: varchar
        description: Name of the category.
      - name: description
        db_column: description
        type: varchar
        description: Description of the category.

  - name: employees
    db_table: employees
    primary_id: employee_id
    description: Stores employee information.
    columns:
      - name: employee_id
        db_column: employee_id
        type: integer
        description: Unique identifier for the employee.
      - name: last_name
        db_column: last_name
        type: varchar
        description: Employee last name.
      - name: first_name
        db_column: first_name
        type: varchar
        description: Employee first name.
      - name: title
        db_column: title
        type: varchar
        description: Job title.
      - name: country
        db_column: country
        type: varchar
        description: Country where the employee is based.
      - name: city
        db_column: city
        type: varchar
        description: City where the employee is based.
      - name: hire_date
        db_column: hire_date
        type: date
        description: Date the employee was hired.
      - name: reports_to
        db_column: reports_to
        type: integer
        description: employee_id of the manager this employee reports to.

  - name: suppliers
    db_table: suppliers
    primary_id: supplier_id
    description: Stores supplier information.
    columns:
      - name: supplier_id
        db_column: supplier_id
        type: integer
        description: Unique identifier for the supplier.
      - name: company_name
        db_column: company_name
        type: varchar
        description: Supplier company name.
      - name: country
        db_column: country
        type: varchar
        description: Country where the supplier is located.
      - name: city
        db_column: city
        type: varchar
        description: City where the supplier is located.

  - name: shippers
    db_table: shippers
    primary_id: shipper_id
    description: Shipping companies used to ship orders.
    columns:
      - name: shipper_id
        db_column: shipper_id
        type: integer
        description: Unique identifier for the shipper.
      - name: company_name
        db_column: company_name
        type: varchar
        description: Name of the shipping company.
      - name: phone
        db_column: phone
        type: varchar
        description: Shipper phone number.

links:
  - name: orders_to_customers
    from_table: orders
    to_table: customers
    join_type: left
    "on":
      - left: orders.customer_id
        op: "="
        right: customers.customer_id

  - name: order_details_to_orders
    from_table: order_details
    to_table: orders
    join_type: left
    "on":
      - left: order_details.order_id
        op: "="
        right: orders.order_id

  - name: order_details_to_products
    from_table: order_details
    to_table: products
    join_type: left
    "on":
      - left: order_details.product_id
        op: "="
        right: products.product_id

  - name: products_to_categories
    from_table: products
    to_table: categories
    join_type: left
    "on":
      - left: products.category_id
        op: "="
        right: categories.category_id

  - name: orders_to_employees
    from_table: orders
    to_table: employees
    join_type: left
    "on":
      - left: orders.employee_id
        op: "="
        right: employees.employee_id

  - name: products_to_suppliers
    from_table: products
    to_table: suppliers
    join_type: left
    "on":
      - left: products.supplier_id
        op: "="
        right: suppliers.supplier_id