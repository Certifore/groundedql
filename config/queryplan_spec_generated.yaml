version: 1
name: IntentQL QueryPlan Spec (auto-generated)
description: Auto-generated from schema.yaml. Instructions for generating QueryPlan
  JSON for the IntentQL compiler. Output MUST be valid JSON only (no markdown, no prose,
  no SQL).
system_instructions: 'You are a QueryPlan generator.

  Your job is to convert a natural-language question into a JSON QueryPlan object.

  You MUST output JSON only — no markdown, no prose, no SQL.


  RULES:

  - dataset MUST be one of: "customers", "orders", "order_details", "products", "categories",
  "employees", "suppliers", "shippers"

  - Use ONLY the logical column names listed in schema_summary below.

  - Do NOT use physical DB column names or write SQL.

  - Always include limit and offset.

  - Give every dimension and metric an alias.

  - metric aliases must be unique within the plan.

  - Prefer consistent, deterministic plans: same question → same JSON.

  '
defaults:
  limit: 100
  offset: 0
  max_limit: 1000
operators_supported:
  comparison:
  - '='
  - '!='
  - '>'
  - '>='
  - <
  - <=
  membership:
  - in
  - not_in
  text:
  - contains
  - not_contains
  - starts_with
  - ends_with
  null_checks:
  - is_null
  - is_not_null
schema_summary:
  customers:
    description: Stores customer information.
    primary_id: customer_id
    primary_id_note: Use count_distinct('customer_id') when counting distinct customers.
    columns:
    - name: customer_id
      type: varchar
      description: Unique identifier for the customer
    - name: company_name
      type: varchar
      description: Name of the customer company
    - name: contact_name
      type: varchar
      description: Name of the primary contact at the company
    - name: contact_title
      type: varchar
      description: Job title of the contact person
    - name: address
      type: varchar
      description: Street address of the customer
    - name: city
      type: varchar
      description: City where the customer is located
    - name: region
      type: varchar
      description: Region or state
    - name: postal_code
      type: varchar
      description: Postal or ZIP code
    - name: country
      type: varchar
      description: Country where the customer is located
    - name: phone
      type: varchar
      description: Customer phone number
    - name: fax
      type: varchar
      description: Customer fax number
  orders:
    description: Stores customer orders.
    primary_id: order_id
    primary_id_note: Use count_distinct('order_id') when counting distinct orders.
    columns:
    - name: order_id
      type: integer
      description: Unique identifier for the order
    - name: customer_id
      type: varchar
      description: Foreign key to customers
    - name: employee_id
      type: integer
      description: Foreign key to employees
    - name: order_date
      type: date
      description: Date the order was placed
    - name: required_date
      type: date
      description: Date the order is required by
    - name: shipped_date
      type: date
      description: Date the order was shipped
    - name: ship_via
      type: integer
      description: Foreign key to shippers
    - name: freight
      type: numeric
      description: Freight cost for the order
    - name: ship_name
      type: varchar
      description: Name of the recipient at the shipping address
    - name: ship_address
      type: varchar
      description: Shipping street address
    - name: ship_city
      type: varchar
      description: Shipping city
    - name: ship_region
      type: varchar
      description: Shipping region or state
    - name: ship_postal_code
      type: varchar
      description: Shipping postal code
    - name: ship_country
      type: varchar
      description: Shipping country
  order_details:
    description: Line items within each order.
    columns:
    - name: order_id
      type: integer
      description: Foreign key to orders
    - name: product_id
      type: integer
      description: Foreign key to products
    - name: unit_price
      type: numeric
      description: Price per unit at time of order
    - name: quantity
      type: integer
      description: Number of units ordered
    - name: discount
      type: numeric
      description: Discount applied as a fraction
  products:
    description: Stores product catalog.
    primary_id: product_id
    primary_id_note: Use count_distinct('product_id') when counting distinct products.
    columns:
    - name: product_id
      type: integer
      description: Unique identifier for the product
    - name: product_name
      type: varchar
      description: Name of the product
    - name: supplier_id
      type: integer
      description: Foreign key to suppliers
    - name: category_id
      type: integer
      description: Foreign key to categories
    - name: quantity_per_unit
      type: varchar
      description: How the product is packaged
    - name: unit_price
      type: numeric
      description: Current price per unit
    - name: units_in_stock
      type: integer
      description: Number of units currently in stock
    - name: units_on_order
      type: integer
      description: Number of units currently on order
    - name: reorder_level
      type: integer
      description: Minimum stock level before reorder is triggered
    - name: discontinued
      type: integer
      description: 1 if the product is discontinued, 0 if active
  categories:
    description: Product categories.
    primary_id: category_id
    primary_id_note: Use count_distinct('category_id') when counting distinct categories.
    columns:
    - name: category_id
      type: integer
      description: Unique identifier for the category
    - name: category_name
      type: varchar
      description: Name of the category
    - name: description
      type: varchar
      description: Description of the category
  employees:
    description: Stores employee information.
    primary_id: employee_id
    primary_id_note: Use count_distinct('employee_id') when counting distinct employees.
    columns:
    - name: employee_id
      type: integer
      description: Unique identifier for the employee
    - name: last_name
      type: varchar
      description: Employee last name
    - name: first_name
      type: varchar
      description: Employee first name
    - name: title
      type: varchar
      description: Job title
    - name: country
      type: varchar
      description: Country where the employee is based
    - name: city
      type: varchar
      description: City where the employee is based
    - name: hire_date
      type: date
