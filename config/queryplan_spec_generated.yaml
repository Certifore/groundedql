    primary_id: shipper_id
    primary_id_note: Use count_distinct('shipper_id') when counting distinct shippers.
    columns:
    - name: shipper_id
      type: integer
      description: Unique identifier for the shipper
    - name: company_name
      type: varchar
      description: Name of the shipping company
    - name: phone
      type: varchar
      description: Shipper phone number
structural_invariants: "DATASET: must be a logical table name from schema_summary.\n\
  \nDIMENSIONS: list of {field, alias} — alias is REQUIRED.\n\nMETRICS: list of {agg,\
  \ field, alias} — alias is REQUIRED and unique.\n  Allowed agg: count, count_distinct,\
  \ sum, avg, min, max.\n  count: field may be '*' or a logical column.\n  count_distinct/sum/avg/min/max:\
  \ field MUST be a logical column, NOT '*'.\n\nFILTERS: list of {field, op, value}.\n\
  \  'contains' = case-insensitive substring match (ILIKE %value%).\n\nORDER_BY: must\
  \ reference an existing dimension alias or metric alias.\n\nLIMIT/OFFSET: always\
  \ present. For rollup inner queries, omit limit so all rows are included before\
  \ outer aggregation.\n\nROLLUP: if present, rollup.metrics[*].field MUST reference\
  \ a metric alias or dimension alias from the inner plan — NOT a raw dataset column\
  \ name.\n"
plan_construction_procedure: "1) Choose dataset: the ONE table that contains the needed\
  \ information.\n2) Extract filters: convert constraints to filter objects using\
  \ logical field names.\n   Use op='contains' for fuzzy text matching (building names,\
  \ keywords, etc.).\n3) Decide output shape:\n   - List of entities: dimensions +\
  \ optional metrics.\n   - Single scalar: metrics only (no dimensions), or dimensions\
  \ + rollup.\n4) Decide grouping: if question says 'by X' / 'per X' / 'for each X',\
  \ put X in dimensions.\n5) Decide metrics: use exactly the aggregations requested.\
  \ Always give each metric an alias.\n6) Two-step aggregation (e.g. 'average per\
  \ building'):\n   - Inner: group by dimension, compute per-group metric with alias.\n\
  \   - Rollup: compute avg/stddev/etc over that INNER metric alias.\n   - OMIT limit\
  \ from inner plan so all groups are included.\n   - rollup.limit=1 for scalar result.\n\
  7) Order + limit: for 'top N' set order_by metric alias desc + limit=N.\n"
semantics_rules: "- Use 'contains' for fuzzy name/keyword matching (compiled as ILIKE\
  \ %...%).\n- Use 'is_not_null' when excluding missing values is necessary for correctness.\n\
  - Do NOT use avg(*) or avg(null) — avg/sum/min/max require a real column field.\n\
  - For time-based filters use the $relative_date sentinel (never a SQL expression):\n\
  \    last 7 days:  {\"$relative_date\": {\"op\": \"now_minus_days\", \"days\": 7}}\n\
  \    last 24 hrs:  {\"$relative_date\": {\"op\": \"now_minus_hours\", \"hours\"\
  : 24}}\n    today:        {\"$relative_date\": {\"op\": \"today\"}}\n    last calendar\
  \ year (two filters on the date column, AND):\n      >= {\"$relative_date\": {\"\
  op\": \"calendar_year_start\", \"year_offset\": -1}}\n      <  {\"$relative_date\"\
  : {\"op\": \"calendar_year_start\", \"year_offset\": 0}}\n- Topic/trade keywords\
  \ (plumbing, etc.): OR \"contains\" across all plausible string columns\n  for that\
  \ table from schema_summary — do not use only one column unless the question names\
  \ it.\n- Do NOT map trade names onto order_type/order_category unless the schema\
  \ says so;\n  those columns are usually workflow (PLANNED, HOUSING, PREVENTIVE,\
  \ …), not crafts.\n- For 'customers': when counting distinct customers, use count_distinct('customer_id')\
  \ — 'customer_id' is the primary identifier.\n- For 'orders': when counting distinct\
  \ orders, use count_distinct('order_id') — 'order_id' is the primary identifier.\n\
  - For 'products': when counting distinct products, use count_distinct('product_id')\
  \ — 'product_id' is the primary identifier.\n- For 'categories': when counting distinct\
  \ categories, use count_distinct('category_id') — 'category_id' is the primary identifier.\n\
  - For 'employees': when counting distinct employees, use count_distinct('employee_id')\
  \ — 'employee_id' is the primary identifier.\n- For 'suppliers': when counting distinct\
  \ suppliers, use count_distinct('supplier_id') — 'supplier_id' is the primary identifier.\n\
  - For 'shippers': when counting distinct shippers, use count_distinct('shipper_id')\
  \ — 'shipper_id' is the primary identifier."
legacy_queryplan_format:
  description: Use this format for all standard analytics queries. Easier for LLMs
    and covers the vast majority of use cases.
  shape:
    version: '1.0'
    dataset: <table name from schema_summary>
    dimensions:
    - field: <logical_column>
      alias: <string>
    metrics:
    - agg: count|count_distinct|sum|avg|min|max
      field: <logical_column_or_*>
      alias: <string>
    filters:
    - field: <logical_column>
      op: <operator>
      value: <any or null>
    order_by:
    - by: <dimension_alias_or_metric_alias>
      dir: asc|desc
    limit: <int>
    offset: <int>
    rollup: <optional — see rollup block>
rollup:
  description: 'Use rollup for aggregate-of-aggregates: ''average per X'', ''stddev
    per X'', ''total of totals'', etc. The inner query groups and computes per-group
    values. The rollup outer query aggregates those values.'
  shape:
    metrics:
    - agg: avg|sum|min|max|count|count_distinct|stddev|variance
      field: <inner_alias>
      alias: <string>
    dimensions: <optional outer grouping>
    filters: <optional filters on inner outputs>
    order_by: <optional>
    limit: <int — use 1 for scalar result>
    offset: <int>
  critical: rollup.metrics[*].field MUST be an alias from the inner plan (a metric
    alias or dimension alias), NOT a raw dataset column name.
validation_checklist: 'Before outputting JSON, verify:

  - dataset is a table name from schema_summary

  - every dimension has {field, alias}

  - every metric has {agg, field, alias} with unique aliases

  - no metric uses avg/sum/min/max with field=''*'' or field=null

  - order_by.by references a dimension alias or metric alias

  - limit and offset are present

  - if rollup: rollup.metrics is non-empty, rollup.metrics[*].field references an
  inner alias

  '
examples:
- question: How many customers are there in total?
  plan:
    version: '1.0'
    dataset: customers
    dimensions: []
    metrics:
    - agg: count_distinct
      field: customer_id
      alias: total_customers
    filters: []
    order_by: []
    limit: 1
    offset: 0
- question: Show me customers where company_name contains 'example'
  plan:
    version: '1.0'
    dataset: customers
    dimensions: []
    metrics: []
    filters:
    - field: company_name
      op: contains
      value: example
    order_by: []
    limit: 100
    offset: 0
- question: How many customers per company_name?
  plan:
    version: '1.0'
    dataset: customers
    dimensions:
    - field: company_name
      alias: company_name
    metrics:
    - agg: count_distinct
      field: customer_id
      alias: customers_count
    filters: []
    order_by:
    - by: customers_count
      dir: desc
    limit: 100
    offset: 0
- question: What is the average number of customers per company_name?
  note: 'Two-step rollup: inner groups by dimension, outer computes avg over inner
    alias.'
  plan:
    version: '1.0'
    dataset: customers
    dimensions:
    - field: company_name
      alias: company_name
    metrics:
    - agg: count_distinct
      field: customer_id
      alias: customers_per_company_name
    filters:
    - field: company_name
      op: is_not_null
      value: null
    order_by: []
    offset: 0
    rollup:
      metrics:
      - agg: avg
        field: customers_per_company_name
        alias: avg_customers_per_company_name
      limit: 1
      offset: 0
