links:
- name: rulings_to_cards
  from_table: rulings
  to_table: cards
  join_type: left
  'on':
  - left: rulings.uuid
    op: '='
    right: cards.uuid
- name: set_translations_to_sets
  from_table: set_translations
  to_table: sets
  join_type: left
  'on':
  - left: set_translations.setcode
    op: '='
    right: sets.code
- name: foreign_data_to_cards_uuid
  from_table: foreign_data
  to_table: cards
  join_type: left
  'on':
  - left: foreign_data.uuid
    op: '='
    right: cards.uuid
- name: legalities_to_cards_uuid
  from_table: legalities
  to_table: cards
  join_type: left
  'on':
  - left: legalities.uuid
    op: '='
    right: cards.uuid
