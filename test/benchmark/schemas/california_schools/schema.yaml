links:
- name: frpm_to_schools
  from_table: frpm
  to_table: schools
  join_type: left
  'on':
  - left: frpm.cdscode
    op: '='
    right: schools.cdscode
- name: satscores_to_schools
  from_table: satscores
  to_table: schools
  join_type: left
  'on':
  - left: satscores.cds
    op: '='
    right: schools.cdscode
