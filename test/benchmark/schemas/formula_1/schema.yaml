links:
- name: qualifying_to_constructors
  from_table: qualifying
  to_table: constructors
  join_type: left
  'on':
  - left: qualifying.constructorid
    op: '='
    right: constructors.constructorid
- name: qualifying_to_drivers
  from_table: qualifying
  to_table: drivers
  join_type: left
  'on':
  - left: qualifying.driverid
    op: '='
    right: drivers.driverid
- name: qualifying_to_races
  from_table: qualifying
  to_table: races
  join_type: left
  'on':
  - left: qualifying.raceid
    op: '='
    right: races.raceid
- name: races_to_circuits
  from_table: races
  to_table: circuits
  join_type: left
  'on':
  - left: races.circuitid
    op: '='
    right: circuits.circuitid
- name: races_to_seasons
  from_table: races
  to_table: seasons
  join_type: left
  'on':
  - left: races.year
    op: '='
    right: seasons.year
- name: results_to_constructors
  from_table: results
  to_table: constructors
  join_type: left
  'on':
  - left: results.constructorid
    op: '='
    right: constructors.constructorid
- name: results_to_drivers
  from_table: results
  to_table: drivers
  join_type: left
  'on':
  - left: results.driverid
    op: '='
    right: drivers.driverid
- name: results_to_races
  from_table: results
  to_table: races
  join_type: left
  'on':
  - left: results.raceid
    op: '='
    right: races.raceid
- name: results_to_status
  from_table: results
  to_table: status
  join_type: left
  'on':
  - left: results.statusid
    op: '='
    right: status.statusid
