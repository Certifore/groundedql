links:
- name: account_to_district
  from_table: account
  to_table: district
  join_type: left
  'on':
  - left: account.district_id
    op: '='
    right: district.district_id
- name: card_to_disp
  from_table: card
  to_table: disp
  join_type: left
  'on':
  - left: card.disp_id
    op: '='
    right: disp.disp_id
- name: client_to_district
  from_table: client
  to_table: district
  join_type: left
  'on':
  - left: client.district_id
    op: '='
    right: district.district_id
- name: disp_to_account
  from_table: disp
  to_table: account
  join_type: left
  'on':
  - left: disp.account_id
    op: '='
    right: account.account_id
- name: disp_to_client
  from_table: disp
  to_table: client
  join_type: left
  'on':
  - left: disp.client_id
    op: '='
    right: client.client_id
- name: loan_to_account
  from_table: loan
  to_table: account
  join_type: left
  'on':
  - left: loan.account_id
    op: '='
    right: account.account_id
- name: order_to_account
  from_table: order
  to_table: account
  join_type: left
  'on':
  - left: order.account_id
    op: '='
    right: account.account_id
- name: trans_to_account
  from_table: trans
  to_table: account
  join_type: left
  'on':
  - left: trans.account_id
    op: '='
    right: account.account_id
