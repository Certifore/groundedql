links:
- name: examination_to_patient
  from_table: examination
  to_table: patient
  join_type: left
  'on':
  - left: examination.id
    op: '='
    right: patient.id
- name: laboratory_to_patient
  from_table: laboratory
  to_table: patient
  join_type: left
  'on':
  - left: laboratory.id
    op: '='
    right: patient.id
